# Docker Compose Configuration for Load Balancing and Scaling
version: '3.8'

services:
  # Nginx Load Balancer
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - app-1
      - app-2
      - app-3
    networks:
      - hotel-network
    restart: unless-stopped

  # Application Instances
  app-1:
    build: 
      context: .
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_HOST=postgres-primary
      - DB_REPLICA_1_HOST=postgres-replica-1
      - DB_REPLICA_2_HOST=postgres-replica-2
      - REDIS_URL=redis://redis:6379
      - INSTANCE_ID=app-1
    depends_on:
      - postgres-primary
      - redis
    networks:
      - hotel-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  app-2:
    build: 
      context: .
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_HOST=postgres-primary
      - DB_REPLICA_1_HOST=postgres-replica-1
      - DB_REPLICA_2_HOST=postgres-replica-2
      - REDIS_URL=redis://redis:6379
      - INSTANCE_ID=app-2
    depends_on:
      - postgres-primary
      - redis
    networks:
      - hotel-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  app-3:
    build: 
      context: .
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_HOST=postgres-primary
      - DB_REPLICA_1_HOST=postgres-replica-1
      - DB_REPLICA_2_HOST=postgres-replica-2
      - REDIS_URL=redis://redis:6379
      - INSTANCE_ID=app-3
    depends_on:
      - postgres-primary
      - redis
    networks:
      - hotel-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis Cache and Session Store
  redis:
    image: redis:alpine
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - hotel-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Primary Database
  postgres-primary:
    image: postgres:14
    environment:
      POSTGRES_DB: hotel_living
      POSTGRES_USER: hotel_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-primary.sql:/docker-entrypoint-initdb.d/init-primary.sql
    ports:
      - "5432:5432"
    command: |
      postgres 
      -c wal_level=replica 
      -c max_wal_senders=3 
      -c max_replication_slots=3
      -c shared_buffers=256MB
      -c effective_cache_size=1GB
      -c maintenance_work_mem=64MB
      -c checkpoint_completion_target=0.7
      -c wal_buffers=16MB
      -c default_statistics_target=100
    networks:
      - hotel-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hotel_user -d hotel_living"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Read Replica 1
  postgres-replica-1:
    image: postgres:14
    environment:
      POSTGRES_DB: hotel_living
      POSTGRES_USER: hotel_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_replica_1_data:/var/lib/postgresql/data
    depends_on:
      - postgres-primary
    networks:
      - hotel-network
    restart: unless-stopped
    command: |
      bash -c "
      until pg_basebackup --pgdata=/var/lib/postgresql/data -R --slot=replication_slot_1 --host=postgres-primary -U hotel_user
      do
        echo 'Waiting for primary to connect...'
        sleep 1s
      done
      echo 'Backup done, starting replica...'
      chmod 0700 /var/lib/postgresql/data
      postgres
      -c hot_standby=on 
      -c max_wal_senders=3 
      -c max_replication_slots=3
      "

  # Read Replica 2  
  postgres-replica-2:
    image: postgres:14
    environment:
      POSTGRES_DB: hotel_living
      POSTGRES_USER: hotel_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_replica_2_data:/var/lib/postgresql/data
    depends_on:
      - postgres-primary
    networks:
      - hotel-network
    restart: unless-stopped
    command: |
      bash -c "
      until pg_basebackup --pgdata=/var/lib/postgresql/data -R --slot=replication_slot_2 --host=postgres-primary -U hotel_user
      do
        echo 'Waiting for primary to connect...'
        sleep 1s
      done
      echo 'Backup done, starting replica...'
      chmod 0700 /var/lib/postgresql/data
      postgres
      -c hot_standby=on 
      -c max_wal_senders=3 
      -c max_replication_slots=3
      "

  # Monitoring Stack
  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - hotel-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - hotel-network
    restart: unless-stopped

networks:
  hotel-network:
    driver: bridge

volumes:
  postgres_data:
  postgres_replica_1_data:
  postgres_replica_2_data:
  redis_data:
  grafana_data: