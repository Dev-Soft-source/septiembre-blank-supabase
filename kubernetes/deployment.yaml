# Kubernetes Deployment Configuration for Auto-scaling
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hotel-living-app
  labels:
    app: hotel-living
    version: v1
spec:
  replicas: 3 # Initial for 1,000 users
  selector:
    matchLabels:
      app: hotel-living
  template:
    metadata:
      labels:
        app: hotel-living
        version: v1
    spec:
      containers:
      - name: hotel-living
        image: hotel-living:latest
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3000"
        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: hotel-living-secrets
              key: db-host
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: hotel-living-secrets
              key: db-user
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: hotel-living-secrets
              key: db-password
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: hotel-living-secrets
              key: redis-url
        - name: SESSION_SECRET
          valueFrom:
            secretKeyRef:
              name: hotel-living-secrets
              key: session-secret
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        startupProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 30

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: hotel-living-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: hotel-living-app
  minReplicas: 3
  maxReplicas: 18 # For 3,000 users maximum
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60

---
apiVersion: v1
kind: Service
metadata:
  name: hotel-living-service
  labels:
    app: hotel-living
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 3000
    protocol: TCP
    name: http
  selector:
    app: hotel-living

---
# ConfigMap for scaling configurations
apiVersion: v1
kind: ConfigMap
metadata:
  name: scaling-config
data:
  # Scaling targets for different user loads
  "1000-users": |
    replicas: 3
    maxReplicas: 6
    cpu: 70%
    memory: 80%
  "2000-users": |
    replicas: 6
    maxReplicas: 12
    cpu: 70%
    memory: 80%
  "3000-users": |
    replicas: 9
    maxReplicas: 18
    cpu: 70%
    memory: 80%